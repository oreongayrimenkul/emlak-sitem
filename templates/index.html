<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lüks Villa | Denizli Bağbaşı</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #bc965d; }
        body { font-family: 'Montserrat', sans-serif; }
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/dis1.jpg'); 
            background-size: cover; height: 100vh; display: flex; align-items: center; color: white; text-align: center;
        }
        .btn-luxury { background: var(--accent); color: white; padding: 15px 40px; border-radius: 0; font-weight: bold; text-decoration: none; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .gallery-img { width: 100%; height: 300px; object-fit: cover; margin-bottom: 20px; border: 2px solid #eee; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="container">
            <h1 class="display-3 mb-4">Denizli Bağbaşı'nda Lüks Yaşam</h1>
            <p class="lead mb-5">555 m² Arsa Üzerinde Kendi Enerjisini Üreten Modern Villa</p>
            <a href="#form" class="btn-luxury">BİLGİ ALIN</a>
        </div>
    </header>

    <section class="py-5 bg-light">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h2 class="mb-4">Geleceğin Evi</h2>
                    <p>Bu özel villa, 320 m² kullanım alanı ve akıllı enerji sistemleriyle donatılmıştır. Videoyu izleyerek tüm detayları görebilirsiniz.</p>
                </div>
                <div class="col-lg-6">
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/5-7dvpViUxA" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5 container">
        <h2 class="text-center mb-5">Villadan Kareler</h2>
        <div class="row">
            <div class="col-md-4"><img src="/static/dis2.jpg" class="gallery-img"></div>
            <div class="col-md-4"><img src="/static/salon1.jpg" class="gallery-img"></div>
            <div class="col-md-4"><img src="/static/mutfak1.jpg" class="gallery-img"></div>
        </div>
    </section>

    <section id="form" class="py-5 bg-dark text-white text-center">
        <div class="container">
            <h2 class="mb-4">Özel Sunum İçin Formu Doldurun</h2>
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <form action="/kaydet" method="POST">
                        <input type="text" name="ad_soyad" class="form-control mb-3" placeholder="Adınız Soyadınız" required>
                        <input type="tel" name="telefon" class="form-control mb-3" placeholder="Telefonunuz" required>
                        <button type="submit" class="btn-luxury w-100">BİLGİ GÖNDER</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
